<!DOCTYPE html>
<html lang="en">
<head>
    <title>Nova Hub | Neura Studio</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="../assets/logo.png"><span>NEURA STUDIO</span></div>
        <div class="nav-links"><a href="../index.html">Home</a><a href="../overview/index.html">Overview</a><a href="../pro/index.html">Pro</a></div>
    </nav>
    <div class="hero">
        <h1>Nova Hub <i class="fa-solid fa-boxes-stacked"></i></h1>
        <input type="text" id="hub-search" placeholder="Search 3,560,000+ packages..." onkeyup="searchHub()" style="padding: 15px; width: 60%; border-radius: 8px; border: 1px solid #ccc;">
        <div class="hub-grid" id="package-grid">
            <!-- डायनामिक पैकेजेस यहां आएंगे -->
        </div>
    </div>
    <script>
        const registry = ["tensorflow", "react", "spring", "boost", "tokio", "pandas", "numpy", "django", "laravel", "express"];
        const grid = document.getElementById('package-grid');
        function render(list) {
            grid.innerHTML = list.map(p => '<div class="card"><h3>'+p+'</h3><code>Nova.import("'+p+'")</code></div>').join('');
        }
        function searchHub() {
            let filter = document.getElementById('hub-search').value.toLowerCase();
            render(registry.filter(p => p.includes(filter)));
        }
        render(registry);
    </script>
</body>
</html>
